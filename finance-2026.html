<style>
:root{--cream:#FBF6EC;--surface:#FFFDF8;--ink:#2B2622;--muted:#8C857A;--line:#E9E1D3;--coral:#FF5019;--taupe:#C2B190;--sage:#5E9087;--brick:#9A3F26;}
*{box-sizing:border-box}html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--cream);color:var(--ink);font-family:Pretendard,-apple-system,system-ui,sans-serif;line-height:1.5}
.wrap{max-width:1080px;margin:0 auto;padding:32px 22px 64px}
.eyebrow{font-family:"DM Mono",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--coral);margin:0 0 6px}
header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:18px}
h1{font-family:Hahmlet,serif;font-weight:700;font-size:30px;margin:0;letter-spacing:-.01em}
.sub{color:var(--muted);font-size:13px;margin-top:6px}
.live{display:inline-block;font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.08em;color:#fff;background:var(--coral);border-radius:999px;padding:2px 9px;margin-left:8px;vertical-align:middle}
.tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:26px;border-bottom:1px solid var(--line)}
.tab{font-family:Pretendard;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:none;padding:11px 15px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}.tab.on{color:var(--coral);border-bottom-color:var(--coral)}
.panel{display:none;animation:fade .25s ease}.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px}
.kpi .lab{font-size:11.5px;color:var(--muted);margin-bottom:7px}
.kpi .val{font-family:"DM Mono",monospace;font-size:19px;font-weight:500;letter-spacing:-.02em}
.kpi .cap{font-family:"DM Mono",monospace;font-size:10.5px;color:var(--muted);margin-top:6px}
.kpi.neg .val{color:var(--brick)}.kpi.pos .val{color:var(--coral)}.kpi.good .val{color:var(--sage)}
section.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 22px 18px;margin-bottom:22px}
.h2{font-family:Hahmlet,serif;font-weight:500;font-size:18px;margin:0 0 2px}
.subh{font-size:12.5px;font-weight:600;color:var(--muted);margin:0 0 8px}
.note{font-size:12px;color:var(--muted);margin:2px 0 14px}
.tag{display:inline-block;font-family:"DM Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--sage);border:1px solid var(--sage);border-radius:999px;padding:2px 8px;margin-left:8px;vertical-align:middle}
.chartbox{position:relative;height:300px}
.grid2{display:grid;grid-template-columns:1.3fr 1fr;gap:24px}.grid2 .chartbox{height:270px}
table.t{width:100%;border-collapse:collapse;font-size:12.5px}
table.t th,table.t td{padding:7px 9px;border-bottom:1px solid var(--line);text-align:right}
table.t th{color:var(--muted);font-weight:600;font-size:11px;background:#F6F2E8}
table.t td:first-child,table.t th:first-child{text-align:left}
table.t td.num{font-family:"DM Mono",monospace;font-variant-numeric:tabular-nums;white-space:nowrap}
table.t td.lft,table.t th.lft{text-align:left}
.neg{color:var(--brick)}.pos{color:var(--coral)}.sg{color:var(--sage)}
.rev th.tot{background:rgba(255,80,25,.14);color:var(--coral)}.rev .totrow td{background:#FAE9E1;font-weight:700}
.exp th.tot{background:rgba(94,144,135,.2);color:#4d7d74}.exp .totrow td{background:#E2EDEA;font-weight:700}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 14px}
.chip{font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:4px 11px;cursor:pointer}
.chip.on{color:#fff;background:var(--coral);border-color:var(--coral)}
.pill{display:inline-block;font-size:10px;font-weight:600;border-radius:5px;padding:1px 6px}
.pill.ct{background:rgba(255,80,25,.13);color:var(--coral)}.pill.on2{background:rgba(46,123,182,.13);color:#2C7BB6}.pill.ck{background:rgba(94,144,135,.16);color:var(--sage)}

.grow{cursor:pointer}.grow:hover td{background:#FBF6EC}.grow.open .rfx{transform:rotate(90deg)}
.gdetail{display:none}.gdetail>td{background:#FCFAF4;padding:0 14px 8px}

.vatnum{font-size:22px;font-weight:500}.vatop{font-size:20px;color:var(--muted)}
.refund{font-size:26px;font-weight:500;color:var(--sage)}
.miniq{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:6px}
.miniq .qc{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--surface)}
.miniq .qc.todo{opacity:.5}.miniq .ql{font-size:11px;color:var(--muted)}.miniq .qv{font-family:"DM Mono",monospace;font-size:15px;margin-top:4px}
.pnlflow{max-width:480px;margin:6px 0 2px}
.prow{display:flex;justify-content:space-between;align-items:baseline;padding:11px 6px;border-bottom:1px solid #F2ECE0}
.prow .pl{font-size:14px}.prow .pv{font-family:"DM Mono",monospace;font-size:17px;font-variant-numeric:tabular-nums}
.prow .pv.pos{color:var(--coral)}.prow .pv.neg{color:var(--brick)}
.op{display:inline-block;width:15px;color:var(--muted);font-weight:600}
.prow.sub{border-top:2px solid var(--ink);border-bottom:none}.prow.sub .pl{font-weight:700}.prow.sub .pv{font-weight:700;font-size:18px}
.prow.sub2{border-top:2px solid var(--ink);background:#FAE9E1;border-radius:8px;margin-top:2px;padding:13px 10px}
.prow.sub2 .pl{font-weight:700;font-size:15px}.prow.sub2 .pv{font-weight:700;font-size:20px}
.kpi2{grid-template-columns:repeat(2,1fr);max-width:520px}
.memo{background:#FBF4E8;border-left:3px solid var(--taupe);border-radius:0 8px 8px 0;padding:12px 15px;margin:0 0 14px;font-size:13px;line-height:1.7;color:#5b5447}
.memo b{color:var(--ink)}.memo .mt{display:block;font-weight:700;color:var(--brick);font-size:11.5px;letter-spacing:.04em;margin-bottom:5px}
@media(max-width:820px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.miniq{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){
.wrap{padding:18px 13px 46px}
.card{padding:15px 14px 13px;border-radius:13px;margin-bottom:16px}
.kpis{gap:9px;margin-bottom:18px}.kpi{padding:12px}.kpi .val{font-size:15px}.kpi .lbl{font-size:11px}
.tabs{margin-bottom:18px}.tab{padding:9px 10px;font-size:12.5px}
.chartbox{height:240px}
.h2{font-size:16.5px}.subh{font-size:12px}
table.t{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap}
.t th,table.t td{padding:8px 10px}
.pnlflow{max-width:100%}.pnlflow .prow .pv{font-size:15px}.pnlflow .prow.sub2 .pv{font-size:17px}.pnlflow .prow .pl{font-size:13px}
.memo{padding:11px 13px;font-size:12.5px}
.kpi2{grid-template-columns:repeat(2,1fr)}
}

   datasets:[{data:DATA.chSum.map(x=>x.amt),backgroundColor:DATA.chSum.map(x=>chColor[x.ch]||'#C2B190')}]},
   options:{plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},cutout:'58%'}});
}

function renderMQ(){
 let h=`<div class="memo"><span class="mt">\uD83D\uDCCC \uC774 \uD0ED \uC77D\uB294 \uBC95</span><b>\uC6D4\uBCC4 \uD45C = \uD604\uAE08 \uD750\uB984</b>(\uB9E4\uB2EC \uC2E4\uC81C \uB098\uAC04 \uB3C8, \uAC10\uAC00\u00B7\uC0C1\uAC01 \uC81C\uC678) \u00B7 <b>\uBD84\uAE30 \uD45C = \uC190\uC775\uACC4\uC0B0\uC11C</b>(\uAC00\uACB0\uC0B0, \uAC10\uAC00\u00B7\uC0C1\uAC01 \uD3EC\uD568). \uB450 \uC22B\uC790\uAC00 \uB2E4\uB978 \uAC74 \uADF8 \uCC28\uC774(\uAC10\uAC00+\uBB34\uD615\uC0C1\uAC01 \uC57D 1,560\uB9CC\uC6D0) \uB54C\uBB38\uC785\uB2C8\uB2E4.</div>
  <section class="card"><div class="h2">\uC6D4\uBCC4 \uD604\uAE08 \uD750\uB984</div><div class="subh">\uB9E4\uCD9C \u00B7 \uD604\uAE08\uC131 \uC9C0\uCD9C \u00B7 \uCC28\uC561</div>
  <table class="t"><tr><th>\uC6D4</th><th>\uB9E4\uCD9C(\uACF5\uAE09\uAC00\uC561)</th><th>\uD604\uAE08\uC131 \uC9C0\uCD9C</th><th>\uCC28\uC561</th></tr>`;
 let ts=0,te=0;
 DATA.monthly.forEach(x=>{if(x.sales||x.exp){ts+=x.sales;te+=x.exp;
   h+=`<tr><td>${x.m}</td><td class="num">${won(x.sales)}</td><td class="num">${won(x.exp)}</td><td class="num ${x.diff<0?'neg':'pos'}">${won(x.diff)}</td></tr>`;}});
 h+=`<tr class="totrow"><td>1\uBD84\uAE30 \uACC4</td><td class="num">${won(ts)}</td><td class="num">${won(te)}</td><td class="num neg">${won(ts-te)}</td></tr></table>
  <p class="note">\uD604\uAE08\uC131 \uC9C0\uCD9C = \uC2E4\uC81C \uB098\uAC04 \uBE44\uC6A9(\uAC10\uAC00\u00B7\uBB34\uD615\uC0C1\uAC01 \uB4F1 \uACB0\uC0B0\uC131 \uC81C\uC678). \uAC00\uACB0\uC0B0 \uC190\uC775\uC740 \uC544\uB798 \uBD84\uAE30 \uD45C \uCC38\uACE0.</p></section>`;
 h+=`<section class="card"><div class="h2">\uBD84\uAE30 \uC190\uC775\uACC4\uC0B0\uC11C (\uAC00\uACB0\uC0B0)</div><div class="subh">\uBD84\uAE30\uAC00 \uBAA8\uC5EC \uC5F0\uAC04 \uAC00\uACB0\uC0B0 \u2192 \uC7AC\uBB34\uC81C\uD45C</div>
  <div class="miniq">
   <div class="qc"><div class="ql">1\uBD84\uAE30 \uC138\uC804\uC190\uC775</div><div class="qv neg">${won(Q.pretax)}</div></div>
   <div class="qc todo"><div class="ql">2\uBD84\uAE30</div><div class="qv">\u2014</div></div>
   <div class="qc todo"><div class="ql">3\uBD84\uAE30</div><div class="qv">\u2014</div></div>
   <div class="qc todo"><div class="ql">4\uBD84\uAE30</div><div class="qv">\u2014</div></div>
  </div>
  <table class="t" style="margin-top:14px"><tr><th>\uD56D\uBAA9</th><th>1\uBD84\uAE30</th><th>\uC5F0\uAC04\uB204\uACC4</th></tr>
   <tr><td>\uB9E4\uCD9C(\uACF5\uAE09\uAC00\uC561)</td><td class="num">${won(Q.sales)}</td><td class="num">${won(Q.sales)}</td></tr>
   <tr><td>\uD310\uAD00\uBE44</td><td class="num">${won(Q.sga)}</td><td class="num">${won(Q.sga)}</td></tr>
   <tr><td><b>\uC601\uC5C5\uC190\uC775</b></td><td class="num neg">${won(Q.op)}</td><td class="num neg">${won(Q.op)}</td></tr>
   <tr><td>\uC601\uC5C5\uC678(\uC774\uC790 \uB4F1)</td><td class="num neg">${won(Q.nonop)}</td><td class="num neg">${won(Q.nonop)}</td></tr>
   <tr class="totrow"><td>\uC138\uC804\uC190\uC775(\uAC00\uACB0\uC0B0)</td><td class="num neg">${won(Q.pretax)}</td><td class="num neg">${won(Q.pretax)}</td></tr>
  </table>
  <p class="note">\uAC00\uACB0\uC0B0 \uC190\uC775\uC740 \uAC10\uAC00\u00B7\uBB34\uD615\uC0C1\uAC01(\uACB0\uC0B0\uC131) \uD3EC\uD568. \uBD84\uAE30 \uC6D0\uC7A5\uC744 \uBC1B\uC744 \uB54C\uB9C8\uB2E4 2~4\uBD84\uAE30 \uCE78\uC774 \uCC44\uC6CC\uC9D1\uB2C8\uB2E4.</p></section>`;
 document.getElementById('mq').innerHTML=h;
}

function renderRev(){
 let h=`<section class="card exp"><div class="h2">\uCC44\uB110\uBCC4 \uC694\uC57D</div>
  <table class="t" style="max-width:420px"><tr><th class="tot">\uCC44\uB110</th><th class="tot">\uACF5\uAE09\uAC00\uC561</th></tr>`;
 DATA.chSum.forEach(x=>{h+=`<tr><td><span class="pill ${pillCls(x.ch)}">${x.ch}</span></td><td class="num">${won(x.amt)}</td></tr>`;});
 h+=`<tr class="totrow"><td>\uD569\uACC4</td><td class="num">${won(Q.sales)}</td></tr></table></section>`;
 h+=`<section class="card rev"><div class="h2">\uB9E4\uCD9C \uB9AC\uC2A4\uD2B8<span class="tag">${DATA.sales.length}\uAC74</span></div>
  <table class="t"><tr><th>\uC77C\uC790</th><th class="lft">\uCC44\uB110</th><th class="lft">\uAC70\uB798\uCC98</th><th class="lft">\uC801\uC694</th><th class="tot">\uACF5\uAE09\uAC00\uC561</th><th>\uC138\uC561</th><th>\uACF5\uAE09\uB300\uAC00</th></tr>`;
 DATA.sales.forEach(x=>{h+=`<tr><td>${x.date}</td><td class="lft"><span class="pill ${pillCls(x.ch)}">${x.ch}</span></td><td class="lft">${x.cp}</td><td class="lft">${x.memo}</td><td class="num tot">${won(x.supply)}</td><td class="num">${won(x.vat)}</td><td class="num">${won(x.gross)}</td></tr>`;});
 h+=`<tr class="totrow"><td colspan="4">\uD569\uACC4</td><td class="num">${won(Q.sales)}</td><td class="num">${won(Q.svat)}</td><td class="num">${won(Q.sales+Q.svat)}</td></tr></table></section>`;
 document.getElementById('rev').innerHTML=h;
}

function renderExp(){
 const G=DATA.groups;
 const sga=G.filter(x=>x.g!=='\uC774\uC790\uBE44\uC6A9(\uC601\uC5C5\uC678)').reduce((a,b)=>a+b.amt,0);
 let h=`<section class="card exp"><div class="h2">\uB9E4\uC785\u00B7\uC9C0\uCD9C \u2014 \uD45C\uC900 8\uADF8\uB8F9<span class="tag">${DATA.exp.length}\uAC74</span></div>
  <div class="memo"><span class="mt">\uD83D\uDCCC \uC774 \uB9AC\uC2A4\uD2B8\uAC00 \uACE7 \uD310\uAD00\uBE44</span><b>8\uADF8\uB8F9(\uAE09\uC5EC~\uAE30\uD0C0) \uD569 = \uD310\uAD00\uBE44 ${won(sga)}</b> \u2014 \uC190\uC775\uACC4\uC0B0\uC11C\uC758 \u2018\uD310\uAD00\uBE44\u2019 \uD55C \uC904\uC744 \uD480\uC5B4\uB193\uC740 \uAC83. <b>\uC774\uC790\uBE44\uC6A9\uB9CC \uD310\uAD00\uBE44\uAC00 \uC544\uB2C8\uB77C \uC601\uC5C5\uC678</b>\uB77C \uB9E8 \uC544\uB798 \uB530\uB85C \uD45C\uC2DC\uB429\uB2C8\uB2E4. \uADF8\uB8F9 \u25B8\uB97C \uB204\uB974\uBA74 \uC6D0\uC7A5 \uACC4\uC815 \u2192 \uAC70\uB798\uB85C \uD480\uB9BD\uB2C8\uB2E4.</div>
  <table class="t exp"><tr><th class="tot">\uD45C\uC900 \uADF8\uB8F9</th><th>\uC6D0\uC7A5 \uACC4\uC815</th><th class="tot">\uAE08\uC561</th></tr>`;
 G.forEach((grp,i)=>{
   h+=`<tr class="grow" data-i="${i}"><td><span class="rfx">\u25B8</span>${grp.g}</td><td class="num">${grp.accs.length}\uAC1C</td><td class="num tot">${won(grp.amt)}</td></tr>`;
   h+=`<tr class="gdetail" id="gd${i}"><td colspan="3">${groupHTML(grp)}</td></tr>`;
 });
 h+=`<tr class="totrow"><td>\uD310\uAD00\uBE44 \uD569\uACC4 (\uC774\uC790 \uC81C\uC678)</td><td></td><td class="num">${won(sga)}</td></tr></table></section>`;
 document.getElementById('exp').innerHTML=h;
 document.querySelectorAll('#exp .grow').forEach(rw=>rw.onclick=()=>{
   const d=document.getElementById('gd'+rw.dataset.i);const op=d.style.display==='table-row';
   d.style.display=op?'none':'table-row';rw.classList.toggle('open',!op);});
}
function groupHTML(grp){
 let h='<div style="padding:6px 0 10px">';
 h+='<table class="t" style="margin-bottom:10px;max-width:380px"><tr><th class="lft">\uC6D0\uC7A5 \uACC4\uC815</th><th>\uAE08\uC561</th></tr>';
 grp.accs.forEach(a=>{h+=`<tr><td class="lft">${a.acct}</td><td class="num">${won(a.amt)}</td></tr>`;});
 h+='</table>';
 h+='<table class="t"><tr><th>\uC77C\uC790</th><th class="lft">\uACC4\uC815</th><th class="lft">\uAC70\uB798\uCC98</th><th class="lft">\uC801\uC694</th><th>\uAE08\uC561</th></tr>';
 grp.txs.forEach(x=>{h+=`<tr><td>${x.date}</td><td class="lft">${x.acct}</td><td class="lft">${x.cp}</td><td class="lft">${x.memo}</td><td class="num">${won(x.amt)}</td></tr>`;});
 h+='</table></div>';
 return h;
}

function renderVat(){
 let h=`<section class="card"><div class="h2">1\uBD84\uAE30 \uBD80\uAC00\uC138</div><div class="subh">\uB9E4\uCD9C\uC138\uC561 \u2212 \uB9E4\uC785\uC138\uC561 = \uB0A9\uBD80\u00B7\uD658\uAE09</div>
  <div class="vatbox"><div><div class="kpi" style="display:inline-block"><div class="lab">\uB9E4\uCD9C\uC138\uC561(\uBD80\uAC00\uC138\uC608\uC218\uAE08)</div><div class="val">${won(Q.svat)}</div></div></div>
   <div class="vatop">\u2212</div>
   <div><div class="kpi" style="display:inline-block"><div class="lab">\uB9E4\uC785\uC138\uC561(\uBD80\uAC00\uC138\uB300\uAE09\uAE08)</div><div class="val">${won(Q.pvat)}</div></div></div>

  <table class="t" style="max-width:480px;margin-top:6px"><tr><th>\uBD84\uAE30</th><th>\uB9E4\uCD9C\uC138\uC561</th><th>\uB9E4\uC785\uC138\uC561</th><th>\uB0A9\uBD80(\u2212\uD658\uAE09)</th></tr>
   <tr><td>1\uBD84\uAE30</td><td class="num">${won(Q.svat)}</td><td class="num">${won(Q.pvat)}</td><td class="num sg">${won(Q.vat)}</td></tr>
   <tr style="opacity:.5"><td>2\uBD84\uAE30</td><td class="num">\u2014</td><td class="num">\u2014</td><td class="num">\u2014</td></tr>
  </table></section>`;
 document.getElementById('vat').innerHTML=h;

const R={sum:renderSum,mq:renderMQ,rev:renderRev,exp:renderExp,vat:renderVat};
const done={};
function show(t){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
 document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id===t));
 if(!done[t]){R[t]();done[t]=1;}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>show(b.dataset.t));
show('sum');
</script></body></html>
